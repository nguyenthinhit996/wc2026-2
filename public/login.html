<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập · World Cup Predictor</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="centered">
  <main class="login-card">
    <div class="badge">⚽ WORLD CUP</div>
    <h1>Sảnh dự đoán</h1>
    <p class="muted">Nhập mã ID bí mật của bạn để vào sân.</p>
    <input id="idInput" type="password" inputmode="text" placeholder="Mã ID của bạn" autocomplete="off" />
    <button id="loginBtn">Vào sân</button>
    <p id="err" class="error" hidden></p>
  </main>
<script>
const idInput = document.getElementById('idInput');
const btn = document.getElementById('loginBtn');
const err = document.getElementById('err');

async function login() {
  err.hidden = true;
  const id = idInput.value.trim();
  if (!id) { showErr('Hãy nhập mã ID.'); return; }
  btn.disabled = true; btn.textContent = 'Đang vào...';
  try {
    const r = await fetch('/api/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id })
    });
    const d = await r.json();
    if (!r.ok) { showErr(d.error || 'Đăng nhập thất bại'); return; }
    location.href = d.role === 'admin' ? '/admin.html' : '/player.html';
  } catch (e) {
    showErr('Không kết nối được máy chủ.');
  } finally {
    btn.disabled = false; btn.textContent = 'Vào sân';
  }
}
function showErr(m){ err.textContent = m; err.hidden = false; }
btn.addEventListener('click', login);
idInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
